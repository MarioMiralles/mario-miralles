<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Courier New', monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b9e7e"></path>
    </marker>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="#0d110f"></rect>

  <!-- Wiki / context store -->
  <rect x="40" y="60" width="200" height="70" rx="8" fill="#1c2420" stroke="rgba(107,158,126,0.35)" stroke-width="1.25"></rect>
  <text x="140" y="90" text-anchor="middle" fill="#e6e1d6" font-size="15" font-weight="600">Context Store</text>
  <text x="140" y="110" text-anchor="middle" fill="#8a8578" font-size="11">markdown wiki, append-only log</text>

  <!-- Backend server -->
  <rect x="300" y="60" width="220" height="70" rx="8" fill="#1c2420" stroke="rgba(107,158,126,0.35)" stroke-width="1.25"></rect>
  <text x="410" y="90" text-anchor="middle" fill="#e6e1d6" font-size="15" font-weight="600">Python HTTP Server</text>
  <text x="410" y="110" text-anchor="middle" fill="#8a8578" font-size="11">~20 REST routes, TLS, auth</text>

  <!-- Web UI -->
  <rect x="580" y="60" width="180" height="70" rx="8" fill="#1c2420" stroke="rgba(107,158,126,0.35)" stroke-width="1.25"></rect>
  <text x="670" y="90" text-anchor="middle" fill="#e6e1d6" font-size="15" font-weight="600">Web UI</text>
  <text x="670" y="110" text-anchor="middle" fill="#8a8578" font-size="11">reports, plans, tasks</text>

  <line x1="240" y1="95" x2="292" y2="95" stroke="#6b9e7e" stroke-width="1.5" marker-end="url(#arrow)"></line>
  <line x1="520" y1="95" x2="572" y2="95" stroke="#6b9e7e" stroke-width="1.5" marker-end="url(#arrow)"></line>

  <!-- systemd timers -->
  <rect x="300" y="220" width="220" height="70" rx="8" fill="#1c2420" stroke="rgba(107,158,126,0.35)" stroke-width="1.25"></rect>
  <text x="410" y="250" text-anchor="middle" fill="#e6e1d6" font-size="15" font-weight="600">systemd Timers</text>
  <text x="410" y="270" text-anchor="middle" fill="#8a8578" font-size="11">scheduled headless agent runs</text>

  <line x1="410" y1="130" x2="410" y2="212" stroke="#6b9e7e" stroke-width="1.5" marker-end="url(#arrow)"></line>

  <!-- multi-agent orchestration -->
  <rect x="220" y="360" width="130" height="70" rx="8" fill="#141a17" stroke="rgba(107,158,126,0.5)" stroke-width="1.25"></rect>
  <text x="285" y="392" text-anchor="middle" fill="#e6e1d6" font-size="13" font-weight="600">Agent A</text>
  <text x="285" y="410" text-anchor="middle" fill="#8a8578" font-size="10">schema-typed</text>

  <rect x="370" y="360" width="130" height="70" rx="8" fill="#141a17" stroke="rgba(107,158,126,0.5)" stroke-width="1.25"></rect>
  <text x="435" y="392" text-anchor="middle" fill="#e6e1d6" font-size="13" font-weight="600">Agent B</text>
  <text x="435" y="410" text-anchor="middle" fill="#8a8578" font-size="10">schema-typed</text>

  <rect x="520" y="360" width="130" height="70" rx="8" fill="#141a17" stroke="rgba(107,158,126,0.5)" stroke-width="1.25"></rect>
  <text x="585" y="392" text-anchor="middle" fill="#e6e1d6" font-size="13" font-weight="600">Agent C</text>
  <text x="585" y="410" text-anchor="middle" fill="#8a8578" font-size="10">schema-typed</text>

  <line x1="360" y1="290" x2="300" y2="358" stroke="#6b9e7e" stroke-width="1.25" marker-end="url(#arrow)"></line>
  <line x1="410" y1="290" x2="435" y2="358" stroke="#6b9e7e" stroke-width="1.25" marker-end="url(#arrow)"></line>
  <line x1="460" y1="290" x2="565" y2="358" stroke="#6b9e7e" stroke-width="1.25" marker-end="url(#arrow)"></line>

  <line x1="140" y1="130" x2="220" y2="285" stroke="rgba(107,158,126,0.4)" stroke-width="1.25" stroke-dasharray="4 4" marker-end="url(#arrow)"></line>

  <text x="400" y="470" text-anchor="middle" fill="#6b9e7e" font-size="11" letter-spacing="0.08em">PARALLEL FAN-OUT &#183; TYPED OUTPUTS &#183; PIPELINED SYNTHESIS</text>
</svg>
